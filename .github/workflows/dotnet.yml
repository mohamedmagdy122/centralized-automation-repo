name: Reusable .NET Workflow
on:
  workflow_call:
    inputs:
      dotnet-version: {required: true, type: string}
      project-path: {required: true, type: string}

permissions:
  contents: read
  security-events: write
  packages: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Build and Publish
      run: dotnet publish ${{ inputs.project-path }} -c Release -o ./build-output

    - name: GitLeaks Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: dotnet-backend

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.project-path }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/dotnet-backend:latest
          ghcr.io/${{ github.repository_owner }}/dotnet-backend:${{ github.sha }}

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ghcr.io/${{ github.repository_owner }}/dotnet-backend:latest
        format: sarif
        output: trivy-dotnet.sarif

    - name: Upload Trivy SARIF
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-dotnet.sarif
        category: trivy-dotnet
